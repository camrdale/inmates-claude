# Deploy the game to GitHub Pages as ONE self-contained HTML file.
# Atomic by construction: no separate module/CSS files means a browser can
# never mix a cached old script with a new page across deploys.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bundle single-file build
        run: |
          mkdir -p _site
          node tools/bundle.js _site/index.html --full
      - uses: actions/upload-pages-artifact@v3
      - id: deployment
        uses: actions/deploy-pages@v4
